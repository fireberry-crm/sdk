name: Publish Fireberry SDK to npm

on:
  workflow_dispatch:

# Prevent concurrent releases
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint SDK
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write

    outputs:
      version: ${{ steps.info.outputs.version }}
      name: ${{ steps.info.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"
          cache-dependency-path: ${{ github.workspace }}/package-lock.json

      - name: Get package info
        id: info
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build SDK
        run: npm run build

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/**/*"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdk-dist
          path: dist/
          retention-days: 1
          compression-level: 6

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write

    environment:
      name: npm
      url: https://www.npmjs.com/package/${{ needs.build.outputs.name }}/v/${{ needs.build.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist
          path: .

      - name: Generate package attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "package.json"

      # Pin to a specific npm version (not @latest) to avoid the broken
      # self-upgrade path that drops `promise-retry` mid-install.
      # See: https://github.com/nodejs/node/issues/62430
      # 11.5.1+ is required for npm trusted publishing.
      - name: Update npm
        run: npm install -g npm@11.12.1

      - name: Publish to npm
        run: npm publish --provenance --access public

  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.build.outputs.version }}" --verify-tag \
            --title "Release v${{ needs.build.outputs.version }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
