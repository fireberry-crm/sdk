name: Publish Fireberry SDK to npm

on:
  workflow_dispatch:

    # Prevent concurrent releases
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Lint & Pack SDK
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write

    outputs:
      version: ${{ steps.info.outputs.version }}
      name: ${{ steps.info.outputs.name }}
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"
          cache-dependency-path: ${{ github.workspace }}/package-lock.json

      - name: Get package info
        id: info
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build SDK
        run: npm run build

      - name: Pack tarball
        id: pack
        run: |
          tarball=$(npm pack --silent)
          echo "tarball=$tarball" >> $GITHUB_OUTPUT
          ls -lh "$tarball"

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Upload tarball
        uses: actions/upload-artifact@v7
        with:
          name: sdk-tarball
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write

    environment:
      name: npm
      url: https://www.npmjs.com/package/${{ needs.build.outputs.name }}/v/${{
        needs.build.outputs.version }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # See: https://github.com/nodejs/node/issues/62430
          node-version: 22.22.0
          registry-url: "https://registry.npmjs.org/"

      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: sdk-tarball
          path: .

      - name: Attest tarball before publish
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ needs.build.outputs.tarball }}

      # See: https://github.com/nodejs/node/issues/62430
      - name: Update npm
        run: npm install -g npm@11.12.1

      - name: Publish to npm
        run: npm publish "${{ needs.build.outputs.tarball }}" --provenance --access
          public

  release:
    name: Create GitHub Release
    needs: [ build, publish ]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.build.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --verify-tag \
            --title "Release v${{ needs.build.outputs.version }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
